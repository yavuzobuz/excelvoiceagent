<!DOCTYPE html>
<!--
    Systematic Revelation - A Generative Art Piece
    Multi-pass scanning system revealing hidden noise terrains
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systematic Revelation - Detaylı Tarama</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1000px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: white;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: var(--anthropic-light-gray);
            border-radius: 3px;
            margin-top: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--anthropic-orange);
            border-radius: 3px;
            transition: width 0.1s ease;
            width: 0%;
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Detaylı Tarama</h1>
            <div class="subtitle">Systematic Revelation — Multi-pass scanning reveals hidden noise terrains</div>

            <!-- Seed Section -->
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <!-- Parameters Section -->
            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Scan Resolution</label>
                    <div class="slider-container">
                        <input type="range" id="scanRes" min="3" max="16" step="1" value="7" oninput="updateParam('scanRes', this.value)">
                        <span class="value-display" id="scanRes-value">7</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Lacunarity</label>
                    <div class="slider-container">
                        <input type="range" id="noiseLacunarity" min="1.5" max="4.0" step="0.1" value="2.2" oninput="updateParam('noiseLacunarity', this.value)">
                        <span class="value-display" id="noiseLacunarity-value">2.2</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="200" max="3000" step="100" value="1000" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">1000</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Accumulation Rate</label>
                    <div class="slider-container">
                        <input type="range" id="accumRate" min="1" max="15" step="1" value="5" oninput="updateParam('accumRate', this.value)">
                        <span class="value-display" id="accumRate-value">5</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Trail Persistence</label>
                    <div class="slider-container">
                        <input type="range" id="trailPersist" min="0.85" max="0.99" step="0.01" value="0.94" oninput="updateParam('trailPersist', this.value)">
                        <span class="value-display" id="trailPersist-value">0.94</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Scan Passes</label>
                    <div class="slider-container">
                        <input type="range" id="scanPasses" min="1" max="5" step="1" value="3" oninput="updateParam('scanPasses', this.value)">
                        <span class="value-display" id="scanPasses-value">3</span>
                    </div>
                </div>
            </div>

            <!-- Colors Section -->
            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Deep Density (High)</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#1a3a5c" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#1a3a5c</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Mid Terrain</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#3d7a6b" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#3d7a6b</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Sparse Regions</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#d4a55a" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#d4a55a</span>
                    </div>
                </div>
            </div>

            <!-- Actions Section -->
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">
                    <div>
                        Initializing scanner...
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // SYSTEMATIC REVELATION — PARAMETER SYSTEM
        // ═══════════════════════════════════════════════════════════════════════

        let params = {
            seed: 42,
            scanRes: 7,
            noiseLacunarity: 2.2,
            particleCount: 1000,
            accumRate: 5,
            trailPersist: 0.94,
            scanPasses: 3,
            colorPalette: ['#1a3a5c', '#3d7a6b', '#d4a55a']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        // ═══════════════════════════════════════════════════════════════════════
        // CORE STATE
        // ═══════════════════════════════════════════════════════════════════════

        let densityField;  // 2D array holding accumulated density
        let particles = [];
        let scanMode = 0;  // 0 = spiral, 1 = raster, 2 = crosshatch
        let renderPhase = 0;
        let totalSteps = 0;
        let currentStep = 0;
        let isRendering = false;

        // ═══════════════════════════════════════════════════════════════════════
        // UTILITY FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function lerpColor(c1, c2, t) {
            const a = hexToRgb(c1), b = hexToRgb(c2);
            return {
                r: a.r + (b.r - a.r) * t,
                g: a.g + (b.g - a.g) * t,
                b: a.b + (b.b - a.b) * t
            };
        }

        function getDensityColor(density) {
            const pal = params.colorPalette;
            // Three-zone color: low -> mid -> high
            if (density < 0.3) {
                const t = density / 0.3;
                const bg = { r: 250, g: 249, b: 245 }; // Anthropic light
                return lerpColor('#faf9f5', pal[2], t * t); // Warm amber for low
            } else if (density < 0.6) {
                const t = (density - 0.3) / 0.3;
                return lerpColor(pal[2], pal[1], t); // Amber to teal
            } else {
                const t = (density - 0.6) / 0.4;
                return lerpColor(pal[1], pal[0], t); // Teal to deep blue
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // P5.JS SETUP & DRAW
        // ═══════════════════════════════════════════════════════════════════════

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            colorMode(RGB, 255, 255, 255, 255);
            noLoop();

            initializeSystem();
        }

        function initializeSystem() {
            if (isRendering) return;
            isRendering = true;
            currentStep = 0;

            randomSeed(params.seed);
            noiseSeed(params.seed);

            const res = params.scanRes;
            const cols = ceil(width / res);
            const rows = ceil(height / res);

            densityField = [];
            for (let i = 0; i < cols * rows; i++) {
                densityField.push(0);
            }

            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new ScanParticle());
            }

            // Calculate total rendering steps for progress bar
            totalSteps = cols * rows * params.scanPasses + particles.length;
            currentStep = 0;
            updateProgress(0);

            background(250, 249, 245);

            // Render in chunks to keep UI responsive
            renderChunk();
        }

        function renderChunk() {
            const chunkSize = 200; // steps per frame to keep smooth
            let steps = 0;
            const res = params.scanRes;
            const cols = ceil(width / res);
            const rows = ceil(height / res);
            const lac = params.noiseLacunarity;

            while (steps < chunkSize && currentStep < totalSteps) {
                // Phase 0: Scan pass 1 (spiral - broad strokes)
                if (renderPhase === 0) {
                    let idx = currentStep;
                    let cx = cols / 2, cy = rows / 2;
                    let angle = 0, step = 1, count = 0;
                    let dx = 1, dy = 0;
                    let x = 0, y = 0;

                    // Compute spiral position for this step directly
                    // Use iterative approach stored in a lookup
                    if (!window._spiralCache) {
                        window._spiralCache = [];
                        let sx = 0, sy = 0, sd = 1, sm = 0, sc = 0;
                        for (let i = 0; i < cols * rows && i < 200000; i++) {
                            window._spiralCache.push({ x: sx, y: sy });
                            sc++;
                            if (sc >= sm) {
                                sc = 0;
                                let tmp = sd; sd = -sm; sm = tmp;
                                dx = sd > 0 ? 1 : sd < 0 ? -1 : 0;
                                dy = sd > 0 ? 0 : sd < 0 ? 0 : 0;
                                if (dx === 0 && dy === 0) {
                                    let angle2 = atan2(sd, sm); // use sd/sm as direction
                                }
                            }
                            // Actually let me do this more cleanly
                            sx += dx;
                            sy += dy;
                        }
                    }

                    if (idx < cols * rows) {
                        let spiralPos = getGridPosition(currentStep, cols, rows, 0);
                        if (spiralPos) {
                            let n = layeredNoise(spiralPos.x * lac * 0.3, spiralPos.y * lac * 0.3, lac);
                            let threshold = map(noise(spiralPos.x * 0.1, spiralPos.y * 0.1, params.seed * 0.01), 0, 1, 0.2, 0.6);
                            if (n > threshold) {
                                let d = (n - threshold) * params.accumRate;
                                addToDens(spiralPos.x, spiralPos.y, d, res, cols, rows);
                            }
                        }
                    }
                }

                // Phase 1: Scan pass 2 (raster - grid detail)
                if (renderPhase === 1) {
                    let idx = currentStep - cols * rows;
                    if (idx >= 0 && idx < cols * rows) {
                        let gx = idx % cols;
                        let gy = floor(idx / cols);
                        let n = layeredNoise(gx * lac * 0.5, gy * lac * 0.5, lac);
                        let detail = map(noise(gx * 0.05, gy * 0.05, 100 + params.seed * 0.01), 0, 1, -0.1, 0.1);
                        let adjusted = constrain(n + detail, 0, 1);
                        if (adjusted > 0.3) {
                            let d = adjusted * params.accumRate * 0.7;
                            addToDens(gx, gy, d, res, cols, rows);
                        }
                    }
                }

                // Phase 2: Scan pass 3 (crosshatch - perpendicular detail)
                if (renderPhase === 2) {
                    let idx = currentStep - (cols * rows * 2);
                    if (idx >= 0 && idx < cols * rows) {
                        let cx = (idx % cols);
                        let cy = floor(idx / cols);
                        // Crosshatch: emphasize diagonal features
                        let diag1 = layeredNoise((cx + cy) * lac * 0.2, (cx - cy) * lac * 0.2, lac);
                        let edgeMag = diag1 * diag1; // Squaring enhances edges
                        if (edgeMag > 0.15) {
                            addToDens(cx, cy, edgeMag * params.accumRate * 0.5, res, cols, rows);
                        }
                    }
                }

                // Phase 3+: Particle tracing
                if (renderPhase >= params.scanPasses) {
                    let pIdx = currentStep - (cols * rows * params.scanPasses);
                    if (pIdx >= 0 && pIdx < particles.length) {
                        let p = particles[pIdx];
                        traceParticle(p, res, cols, rows, lac);
                    }
                }

                currentStep++;
                steps++;
            }

            let progress = currentStep / totalSteps;
            updateProgress(progress * 100);

            if (currentStep < totalSteps) {
                requestAnimationFrame(renderChunk);
            } else {
                // Final render pass - draw the density field
                renderDensityField(res, cols, rows);
                isRendering = false;
                updateProgress(100);
                // Hide the loading/progress after a beat
                setTimeout(() => {
                    let el = document.querySelector('.loading');
                    if (el) el.style.display = 'none';
                }, 500);
            }
        }

        function renderDensityField(res, cols, rows) {
            loadPixels();
            let maxDens = 0;
            for (let i = 0; i < densityField.length; i++) {
                if (densityField[i] > maxDens) maxDens = densityField[i];
            }
            // Normalize
            let norm = maxDens > 0 ? 1.0 / maxDens : 1;

            for (let gy = 0; gy < rows; gy++) {
                for (let gx = 0; gx < cols; gx++) {
                    let idx = gy * cols + gx;
                    let dens = densityField[idx] * norm;

                    let px = gx * res;
                    let py = gy * res;

                    let col = getDensityColor(dens);

                    // Add slight variation from noise for texture
                    let nt = noise(gx * 0.3, gy * 0.3) * 8 - 4;

                    fill(
                        constrain(col.r + nt, 0, 255),
                        constrain(col.g + nt, 0, 255),
                        constrain(col.b + nt, 0, 255)
                    );
                    noStroke();
                    rect(px, py, res, res);
                }
            }

            // Overlay subtle scan grid lines on first pass
            if (params.scanPasses >= 1) {
                stroke(20, 20, 19, 3);
                strokeWeight(0.5);
                let step = params.scanRes * params.scanPasses;
                for (let x = 0; x < width; x += step) {
                    line(x, 0, x, height);
                }
                for (let y = 0; y < height; y += step) {
                    line(0, y, width, y);
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // LAYERED NOISE FUNCTION
        // ═══════════════════════════════════════════════════════════════════════

        function layeredNoise(x, y, lacunarity) {
            let val = 0;
            let amp = 1;
            let freq = 1;
            let maxAmp = 0;

            // Three octaves: base terrain, ridges, micro-texture
            for (let i = 0; i < 3; i++) {
                val += noise(x * freq, y * freq) * amp;
                maxAmp += amp;
                amp *= 0.5;
                freq *= lacunarity;
            }

            return val / maxAmp;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SCAN POSITION GENERATORS
        // ═══════════════════════════════════════════════════════════════════════

        let spiralCache = null;

        function getGridPosition(step, cols, rows, mode) {
            if (mode === 0) {
                // Spiral scan
                if (!spiralCache || spiralCache._cols !== cols || spiralCache._rows !== rows) {
                    spiralCache = generateSpiralOrder(cols, rows);
                    spiralCache._cols = cols;
                    spiralCache._rows = rows;
                }
                if (step < spiralCache.length) {
                    return spiralCache[step];
                }
                return null;
            } else if (mode === 1) {
                // Raster scan
                return { x: step % cols, y: floor(step / cols) };
            } else {
                // Crosshatch diagonal
                let total = cols * rows;
                return { x: step % cols, y: floor(step / cols) };
            }
        }

        function generateSpiralOrder(cols, rows) {
            let result = [];
            let left = 0, right = cols - 1, top = 0, bottom = rows - 1;

            while (left <= right && top <= bottom) {
                for (let i = left; i <= right; i++) result.push({ x: i, y: top });
                top++;
                for (let i = top; i <= bottom; i++) result.push({ x: right, y: i });
                right--;
                if (top <= bottom) {
                    for (let i = right; i >= left; i--) result.push({ x: i, y: bottom });
                    bottom--;
                }
                if (left <= right) {
                    for (let i = bottom; i >= top; i--) result.push({ x: left, y: i });
                    left++;
                }
            }
            return result;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // DENSITY FIELD OPERATIONS
        // ═══════════════════════════════════════════════════════════════════════

        function addToDens(gx, gy, amount, res, cols, rows) {
            if (gx < 0 || gx >= cols || gy < 0 || gy >= rows) return;
            let idx = gy * cols + gx;
            densityField[idx] += amount;

            // Spread to neighbors (diffusion)
            let spread = amount * 0.2;
            if (gx > 0) densityField[idx - 1] += spread;
            if (gx < cols - 1) densityField[idx + 1] += spread;
            if (gy > 0) densityField[idx - cols] += spread;
            if (gy < rows - 1) densityField[idx + cols] += spread;
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SCAN PARTICLE SYSTEM
        // ═══════════════════════════════════════════════════════════════════════

        class ScanParticle {
            constructor() {
                // Birth on edges or random
                let edge = random() < 0.4;
                if (edge) {
                    let side = floor(random(4));
                    if (side === 0) { this.x = 0; this.y = random(height); }
                    else if (side === 1) { this.x = width; this.y = random(height); }
                    else if (side === 2) { this.x = random(width); this.y = 0; }
                    else { this.x = random(width); this.y = height; }
                } else {
                    this.x = random(width);
                    this.y = random(height);
                }

                this.vx = 0;
                this.vy = 0;
                this.life = random(80, 300);
                this.maxLife = this.life;
                this.speed = random(0.5, 2.5);
                this.influence = random(0.3, 1.2);

                // Assign to a noise valley or ridge
                let nx = noise(this.x * 0.005, this.y * 0.005);
                this.ridge = nx > 0.5;
            }
        }

        function traceParticle(p, res, cols, rows, lacunarity) {
            for (let step = 0; step < 30 && p.life > 0; step++) {
                let gx = p.x / res;
                let gy = p.y / res;

                // Sample noise gradient
                let eps = 0.5;
                let nL = layeredNoise(gx - eps, gy, lacunarity);
                let nR = layeredNoise(gx + eps, gy, lacunarity);
                let nU = layeredNoise(gx, gy - eps, lacunarity);
                let nD = layeredNoise(gx, gy + eps, lacunarity);

                let gradX, gradY;
                if (p.ridge) {
                    // Flow toward higher values (ridges attract)
                    gradX = nR - nL;
                    gradY = nD - nU;
                } else {
                    // Flow toward lower values (valleys attract)
                    gradX = nL - nR;
                    gradY = nU - nD;
                }

                p.vx += gradX * 0.5 * p.speed;
                p.vy += gradY * 0.5 * p.speed;

                // Damping
                p.vx *= params.trailPersist;
                p.vy *= params.trailPersist;

                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                // Deposit along path
                if (p.x >= 0 && p.x < width && p.y >= 0 && p.y < height) {
                    let pgx = floor(p.x / res);
                    let pgy = floor(p.y / res);
                    let deposit = p.influence * (p.life / p.maxLife);
                    addToDens(pgx, pgy, deposit, res, cols, rows);
                }

                // Kill if out of bounds
                if (p.x < 0 || p.x >= width || p.y < 0 || p.y >= height) {
                    p.life = 0;
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════════════
        // UI CONTROL HANDLERS
        // ═══════════════════════════════════════════════════════════════════════

        function updateProgress(pct) {
            let bar = document.getElementById('progress-bar');
            if (bar) bar.style.width = pct + '%';
        }

        function updateParam(paramName, value) {
            value = parseFloat(value);
            params[paramName] = value;
            let display = document.getElementById(paramName + '-value');
            if (display) display.textContent = value;

            // Trigger regeneration
            spiralCache = null;
            window._spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.charAt(5)) - 1;
            params.colorPalette[idx] = value;
            let display = document.getElementById(colorId + '-value');
            if (display) display.textContent = value;

            spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        // ═══════════════════════════════════════════════════════════════════════
        // SEED CONTROL FUNCTIONS
        // ═══════════════════════════════════════════════════════════════════════

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                spiralCache = null;
                renderPhase = 0;
                document.querySelector('.loading').style.display = 'flex';
                updateProgress(0);
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('scanRes').value = params.scanRes;
            document.getElementById('scanRes-value').textContent = params.scanRes;
            document.getElementById('noiseLacunarity').value = params.noiseLacunarity;
            document.getElementById('noiseLacunarity-value').textContent = params.noiseLacunarity;
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('accumRate').value = params.accumRate;
            document.getElementById('accumRate-value').textContent = params.accumRate;
            document.getElementById('trailPersist').value = params.trailPersist;
            document.getElementById('trailPersist-value').textContent = params.trailPersist;
            document.getElementById('scanPasses').value = params.scanPasses;
            document.getElementById('scanPasses-value').textContent = params.scanPasses;

            params.colorPalette = ['#1a3a5c', '#3d7a6b', '#d4a55a'];
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];

            updateSeedDisplay();
            spiralCache = null;
            renderPhase = 0;
            document.querySelector('.loading').style.display = 'flex';
            updateProgress(0);
            initializeSystem();
        }

        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
